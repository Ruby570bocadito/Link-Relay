<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C2 Team Server - Authentication</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="login-container">
        <div class="glass-panel login-box">
            <h1>TEAM SERVER</h1>
            <p>Authentication Required</p>
            
            {% if error %}
            <div class="error-msg">
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="input-group">
                    <label for="username">Operator ID</label>
                    <input type="text" id="username" name="username" required autocomplete="off" spellcheck="false" placeholder="Enter ID">
                </div>
                
                <div class="input-group">
                    <label for="password">Passphrase</label>
                    <input type="password" id="password" name="password" required placeholder="••••••••">
                </div>
                
                <button type="submit" class="btn-primary">Authenticate</button>
            </form>
        </div>
    </div>
</body>
</html>
